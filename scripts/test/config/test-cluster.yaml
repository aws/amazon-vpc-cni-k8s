# A cluster with two managed nodegroups for test
---
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: CLUSTER_NAME_PLACEHOLDER
  region: us-west-2
  version: "K8S_VERSION_PLACEHOLDER"

autoModeConfig:
  enabled: false

addons:
  - name: vpc-cni
  - name: kube-proxy
  - name: coredns
    configurationValues: "{\"podDisruptionBudget\": {\"enabled\": false}}"
  - name: metrics-server
    # hostNetwork pins metrics-server to node-primary IPs. The EKS apiserver allows
    # proxying only to recognized VPC CIDRs, and recognizing the 100.64.0.0/16 CIDR the
    # tests associate at runtime can take hours ("Address is not allowed" until then;
    # see https://repost.aws/knowledge-center/eks-multiple-cidr-ranges). An unreachable
    # metrics.k8s.io APIService stalls all namespace deletion mid-test.
    configurationValues: "{\"podDisruptionBudget\": {\"enabled\": false}, \"hostNetwork\": {\"enabled\": true}}"

iam:
   serviceRoleARN: "ROLE_ARN_PLACEHOLDER"
managedNodeGroups:
  - name: cni-test-arm64-mng
    instanceType: c6g.xlarge
    desiredCapacity: 3
    minSize: 3
    maxSize: 3
    volumeSize: 40
    releaseVersion: ""
    tags:
      group: amazon-vpc-cni-k8s-arm64

  - name: cni-test-x86-mng
    instanceType: c5.xlarge
    desiredCapacity: 3
    minSize: 3
    maxSize: 3
    volumeSize: 40
    releaseVersion: ""
    tags:
      group: amazon-vpc-cni-k8s-x86
availabilityZones:
  - us-west-2a
  - us-west-2b
  - us-west-2c
  - us-west-2d