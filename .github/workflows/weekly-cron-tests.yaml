name: Weekly Cron tests

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run on manual dispatch'
        type: choice
        options:
          - all
          - weekly-cron
          - mixed-os-snat-cron
        default: all
  schedule:
    - cron: "0 16 * * 3" # every Wednesday — perf + bottlerocket
    - cron: "0 16 * * 0" # every Sunday — mixed-OS SNAT/kube-proxy

permissions:
  id-token: write
  contents: read

jobs:
  weekly-cron:
    if: |
      github.repository == 'aws/amazon-vpc-cni-k8s' && (
        github.event.schedule == '0 16 * * 3' ||
        (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'weekly-cron'))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest commit in the PR
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # refs/tags/v7.0.1
      - name: Set up Docker QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # refs/tags/v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # refs/tags/v4.2.0
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # refs/tags/v7.0.0
        with:
          go-version-file: go.mod
      - name: Set up tools
        run: |
          # Install ginkgo version from go.mod
          go install -mod=mod github.com/onsi/ginkgo/v2/ginkgo
          curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin/
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # refs/tags/v6.2.2
        with:
          role-to-assume: ${{ secrets.OSS_TEST_ROLE_ARN }}
          role-duration-seconds: 28800 # 8 hours
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - name: Run perf tests
        env:
          DISABLE_PROMPT: true
          ROLE_CREATE: false
          ROLE_ARN: ${{ secrets.EKS_CLUSTER_ROLE_ARN }}
          RUN_CNI_INTEGRATION_TESTS: false
          PERFORMANCE_TEST_S3_BUCKET_NAME: cni-performance-tests
          RUN_PERFORMANCE_TESTS: true
        run: |
          ./scripts/run-integration-tests.sh
        if: always()
      - name: Run bottlerocket tests
        env:
          DISABLE_PROMPT: true
          ROLE_CREATE: false
          ROLE_ARN: ${{ secrets.EKS_CLUSTER_ROLE_ARN }}
          RUN_CNI_INTEGRATION_TESTS: false
          RUN_BOTTLEROCKET_TEST: true
        run: |
          ./scripts/run-integration-tests.sh
        if: always()

  mixed-os-snat-cron:
    if: |
      github.repository == 'aws/amazon-vpc-cni-k8s' && (
        github.event.schedule == '0 16 * * 0' ||
        (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'mixed-os-snat-cron'))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest commit in the PR
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # refs/tags/v7.0.1
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # refs/tags/v7.0.0
        with:
          go-version-file: go.mod
      - name: Set up tools
        run: |
          go install -mod=mod github.com/onsi/ginkgo/v2/ginkgo
          curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin/
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # refs/tags/v6.2.2
        with:
          role-to-assume: ${{ secrets.OSS_TEST_ROLE_ARN }}
          role-duration-seconds: 28800 # 8 hours
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - name: Resolve latest EKS Kubernetes version
        id: k8s-version
        run: |
          version=$(aws eks describe-cluster-versions \
            --version-status STANDARD_SUPPORT \
            --query 'clusterVersions[].clusterVersion' \
            --output text \
            | tr '\t' '\n' | sort -V | tail -1)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved latest EKS Kubernetes version: ${version}"
      - name: Run mixed-OS SNAT/kube-proxy tests
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          K8S_VERSION: ${{ steps.k8s-version.outputs.version }}
        run: |
          ./scripts/run-mixed-os-snat-kube-proxy-test.sh
