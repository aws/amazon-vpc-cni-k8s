name: Kops tests

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 15 * * *" # every day

permissions:
  id-token: write
  contents: read

jobs:
  daily-kops:
    if: github.repository == 'aws/amazon-vpc-cni-k8s'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest commit in the PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # refs/tags/v6.0.2
      - name: Set up Docker QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # refs/tags/v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # refs/tags/v4.0.0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # refs/tags/v6.4.0
        with:
          go-version: "1.25"
      - name: Set up tools
        run: |
          # Install ginkgo version from go.mod
          go install -mod=mod github.com/onsi/ginkgo/v2/ginkgo
          curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin/
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # refs/tags/v4.0.2
        with:
          role-to-assume: ${{ secrets.OSS_TEST_ROLE_ARN }}
          role-duration-seconds: 28800 # 8 hours
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - name: Run kops tests
        env:
          DISABLE_PROMPT: true
          ROLE_CREATE: false
          ROLE_ARN: ${{ secrets.EKS_CLUSTER_ROLE_ARN }}
          RUN_CNI_INTEGRATION_TESTS: false
          RUN_KOPS_TEST: true
          K8S_VERSION: 1.34.0-beta.0
          KOPS_VERSION: v1.34.0-beta.1
          KOPS_RUN_TOO_NEW_VERSION: 1
        run: |
          ./scripts/run-integration-tests.sh
        if: always()
