name: "Dependency Review"
on:
  pull_request:
    branches:
      - "master"
      - "release*"
      - "sdkv2"
permissions:
  contents: read
jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # refs/tags/v6.0.3
        with:
          show-progress: false
      - name: "Dependency Review"
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # refs/tags/v5.0.0
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # refs/tags/v6.0.3
        with:
          show-progress: false
      - name: Setup Go Version
        run: echo "GO_VERSION=$(cat .go-version)" >> $GITHUB_ENV
      - id: govulncheck
        uses: ./.github/actions/govulncheck
        with:
          go-version-input: ${{ env.GO_VERSION }}
          go-version-file: go.mod
          cache: false
          repo-checkout: false
      - id: govulncheck-tests-agent
        uses: ./.github/actions/govulncheck
        with:
          go-version-input: ${{ env.GO_VERSION }}
          go-version-file: test/agent/go.mod
          cache: false
          repo-checkout: false
