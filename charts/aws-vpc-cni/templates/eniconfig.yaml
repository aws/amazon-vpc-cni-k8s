{{- if .Values.eniConfig.create }}
{{- range $key, $value := (required ".Values.eniConfig.subnets must be specified" .Values.eniConfig.subnets) }}
apiVersion: crd.k8s.amazonaws.com/v1alpha1
kind: ENIConfig
metadata:
  name: "{{ $key }}"
spec:
  {{- if $value.securityGroups }}
  securityGroups:
    {{- range $sg := $value.securityGroups }}
    - {{ $sg }}
    {{- end }}
  {{- end }}
  subnet: {{ $value.id }}
  {{- if hasKey $value "warmIPTarget" }}
  warmIPTarget: {{ $value.warmIPTarget }}
  {{- end }}
  {{- if hasKey $value "minimumIPTarget" }}
  minimumIPTarget: {{ $value.minimumIPTarget }}
  {{- end }}
  {{- if hasKey $value "warmENITarget" }}
  warmENITarget: {{ $value.warmENITarget }}
  {{- end }}
  {{- if hasKey $value "warmPrefixTarget" }}
  warmPrefixTarget: {{ $value.warmPrefixTarget }}
  {{- end }}
  {{- if hasKey $value "maxENI" }}
  maxENI: {{ $value.maxENI }}
  {{- end }}
---
{{- end }}
{{- end }}
