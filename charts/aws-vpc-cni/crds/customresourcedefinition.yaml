apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: eniconfigs.crd.k8s.amazonaws.com
spec:
  scope: Cluster
  group: crd.k8s.amazonaws.com
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
          description: ENIConfig is the Schema for the eniconfigs API
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: ENIConfigSpec defines the desired state of ENIConfig
              properties:
                securityGroups:
                  items:
                    type: string
                  type: array
                subnet:
                  type: string
                warmIPTarget:
                  description: |-
                    WarmIPTarget overrides WARM_IP_TARGET for nodes selecting this ENIConfig.
                    Only consulted when AWS_VPC_K8S_CNI_CUSTOM_NETWORK_CFG=true. Read at daemon startup.
                  type: integer
                  minimum: 0
                minimumIPTarget:
                  description: |-
                    MinimumIPTarget overrides MINIMUM_IP_TARGET for nodes selecting this ENIConfig.
                    Only consulted when AWS_VPC_K8S_CNI_CUSTOM_NETWORK_CFG=true. Read at daemon startup.
                  type: integer
                  minimum: 0
                warmENITarget:
                  description: |-
                    WarmENITarget overrides WARM_ENI_TARGET for nodes selecting this ENIConfig.
                    Only consulted when AWS_VPC_K8S_CNI_CUSTOM_NETWORK_CFG=true. Read at daemon startup.
                  type: integer
                  minimum: 0
                warmPrefixTarget:
                  description: |-
                    WarmPrefixTarget overrides WARM_PREFIX_TARGET for nodes selecting this ENIConfig.
                    Only consulted when AWS_VPC_K8S_CNI_CUSTOM_NETWORK_CFG=true. Read at daemon startup.
                  type: integer
                  minimum: 0
                maxENI:
                  description: |-
                    MaxENI overrides MAX_ENI for nodes selecting this ENIConfig. The result is
                    clamped to the instance type's ENI limit. Only consulted when
                    AWS_VPC_K8S_CNI_CUSTOM_NETWORK_CFG=true. Read at daemon startup.
                  type: integer
                  minimum: 1
              required:
              - subnet
              type: object
            status:
              description: ENIConfigStatus defines the observed state of ENIConfig
              type: object
  names:
    plural: eniconfigs
    singular: eniconfig
    kind: ENIConfig
